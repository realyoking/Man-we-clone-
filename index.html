<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manus Mini | GPT-5.3 Coding Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }
        .glass { background: rgba(25, 25, 25, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .code-block { font-family: 'Fira Code', monospace; background: #000; padding: 1rem; border-radius: 8px; margin: 0.5rem 0; overflow-x: auto; }
        .task-badge { background: #1e293b; border: 1px solid #3b82f6; color: #60a5fa; font-size: 0.75rem; padding: 2px 8px; border-radius: 99px; }
        .typing::after { content: '|'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="setup-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-90">
        <div class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-semibold mb-2">Connect GitHub</h2>
            <p class="text-gray-400 mb-6 text-sm">Enter your GitHub Personal Access Token (PAT) to use GPT-5.3 Mini.</p>
            <input type="password" id="api-key-input" placeholder="ghp_xxxxxxxxxxxx" 
                class="w-full bg-black border border-gray-700 rounded-lg p-3 mb-4 focus:border-blue-500 outline-none transition-all">
            <button onclick="saveKey()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-lg transition-all">
                Initialize Agent
            </button>
        </div>
    </div>

    <header class="p-4 glass flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="font-semibold tracking-tight text-lg">MANUS <span class="text-blue-500">MINI</span></h1>
        </div>
        <div class="flex gap-4 items-center text-xs text-gray-400">
            <span>MODEL: GPT-5.3-INSTANT</span>
            <button onclick="clearKey()" class="hover:text-red-400 transition-colors"><i class="fa-solid fa-key mr-1"></i>Reset</button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 scroll-smooth" id="chat-container">
        <div class="max-w-3xl mx-auto opacity-50 text-center py-20">
            <p class="text-xl italic font-light">"How can we build the future today?"</p>
        </div>
    </main>

    <div id="task-sidebar" class="fixed right-4 top-24 w-64 hidden lg:block space-y-3">
        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Active Tasks</h3>
        <div id="task-list" class="space-y-2">
            </div>
    </div>

    <footer class="p-4 md:p-6 glass">
        <div class="max-w-3xl mx-auto relative">
            <textarea id="user-input" rows="1" placeholder="Describe your coding task..."
                class="w-full bg-[#111] border border-gray-800 rounded-xl p-4 pr-16 focus:border-blue-500 outline-none resize-none transition-all"
                oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
            <button onclick="sendMessage()" class="absolute right-3 bottom-3 p-2 px-4 bg-blue-600 rounded-lg hover:bg-blue-500 transition-all">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
        <div id="suggestions" class="max-w-3xl mx-auto mt-3 flex flex-wrap gap-2"></div>
    </footer>

    <script>
        let GITHUB_TOKEN = localStorage.getItem('manus_pat');
        if(GITHUB_TOKEN) document.getElementById('setup-modal').style.display = 'none';

        function saveKey() {
            const key = document.getElementById('api-key-input').value;
            if(key.startsWith('ghp_')) {
                localStorage.setItem('manus_pat', key);
                GITHUB_TOKEN = key;
                document.getElementById('setup-modal').style.display = 'none';
            } else {
                alert("Invalid GitHub PAT format.");
            }
        }

        function clearKey() {
            localStorage.removeItem('manus_pat');
            location.reload();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const text = input.value.trim();
            if(!text) return;

            // User Message UI
            appendMessage('user', text);
            input.value = '';
            input.style.height = 'auto';

            // Placeholder for AI
            const aiMsgDiv = appendMessage('ai', 'Initializing reasoning sequence...');
            const taskList = document.getElementById('task-list');
            
            // Fake "Agent" Step
            addTask("Analyzing repository context...");

            try {
                // OpenAI API call (configured for GitHub/OpenAI proxy as of 2026)
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "gpt-5.3-mini", // Use your specific version
                        messages: [
                            {role: "system", content: "You are Manus Mini, a coding agent. Be concise. Use Markdown. If a task is complex, list the steps as [TASK: Action]. Suggest 2 short follow-up questions at the end starting with '>>'."},
                            {role: "user", content: text}
                        ],
                        temperature: 0.3
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;
                
                // Process content for tasks and follow-ups
                formatAIResponse(aiMsgDiv, content);

            } catch (err) {
                aiMsgDiv.innerHTML = `<span class="text-red-400">Error: Check API Key or Network.</span>`;
            }
        }

        function appendMessage(role, text) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `max-w-3xl mx-auto flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="p-4 rounded-2xl ${role === 'user' ? 'bg-blue-600 text-white' : 'glass w-full'} max-w-[90%]">
                    <p class="text-sm">${text}</p>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div.querySelector('p');
        }

        function addTask(label) {
            const list = document.getElementById('task-list');
            const div = document.createElement('div');
            div.className = "glass p-2 rounded text-[10px] flex items-center gap-2 border-l-2 border-blue-500";
            div.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin text-blue-500"></i> ${label}`;
            list.prepend(div);
        }

        function formatAIResponse(element, text) {
            // Extract Tasks
            const taskRegex = /\[TASK: (.*?)\]/g;
            let match;
            while ((match = taskRegex.exec(text)) !== null) {
                addTask(match[1]);
            }

            // Extract Suggestions
            const suggestionRegex = />>(.*)/g;
            const sugContainer = document.getElementById('suggestions');
            sugContainer.innerHTML = '';
            
            let cleanText = text.replace(taskRegex, '<span class="task-badge">$1</span>');
            const parts = cleanText.split('>>');
            
            element.innerHTML = parts[0].replace(/```([\s\S]*?)```/g, '<div class="code-block">$1</div>');

            if(parts.length > 1) {
                parts.slice(1).forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = "text-[10px] bg-[#111] border border-gray-800 px-3 py-1 rounded-full hover:border-blue-500 transition-all";
                    btn.innerText = s.trim();
                    btn.onclick = () => { document.getElementById('user-input').value = s.trim(); sendMessage(); };
                    sugContainer.appendChild(btn);
                });
            }
        }
    </script>
</body>
</html>
